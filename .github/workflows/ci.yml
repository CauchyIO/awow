name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gather-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generated surfaces in sync (.claude/, .github/, dist/)
        run: python tools/gather.py --check
